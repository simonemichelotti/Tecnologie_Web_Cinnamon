{% extends "recipes/base.html" %}

{% load crispy_forms_tags %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="content-section">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <fieldset class="form-group">
                        <legend class="border-bottom mb-4">Aggiorna Profilo</legend>
                        
                        <!-- Foto profilo attuale -->
                        {% if profile.profile_image %}
                        <div class="form-group text-center mb-4">
                            <img class="rounded-circle" src="{{ profile.profile_image.url }}" width="150" height="150" style="object-fit: cover;">
                            <p class="text-muted mt-2">Foto profilo attuale</p>
                        </div>
                        {% endif %}
                        
                        <!-- Form per informazioni utente -->
                        <div class="row">
                            <div class="col-md-6">
                                <h5 class="mb-3">Informazioni Account</h5>
                                {{ u_form|crispy }}
                            </div>
                            <div class="col-md-6">
                                <h5 class="mb-3">Informazioni Profilo</h5>
                                {{ p_form|crispy }}
                            </div>
                        </div>
                    </fieldset>
                    <div class="form-group">
                        <button class="btn btn-primary" type="submit">
                            <i class="fas fa-save"></i> Salva Modifiche
                        </button>
                        <a class="btn btn-secondary ml-2" href="{% url 'user-profile' %}">
                            <i class="fas fa-times"></i> Annulla
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
